<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/imgs/icon.png" type="image/x-icon">
</head>
<body>
<div class="grid">

    <div class="topo">
        <img src="/assets/imgs/cofrinho-porco.png" alt="#" width="100px" class="img">
        <aside class="list">
            <nav>
            <ul>
                <li class="button"><a href="#" >Saiba mais</a></li>
                <li class="button"><a href="#" >Contato</a></li>
            </ul>
            </nav>
        </aside>
    </div>
    
    <header class="header">
        <div>
        <h1>Vida Financeira</h1>
        <h2>Suas financias na palma da mão!</h2>
        <img src="assets/vid/Scroll down.gif" alt="seta" class="seta">
        </div>
        
    </header>

    <main class="container">

        <div class="section">
            <h2>Lembretes</h2>
            <label for="lembretes">Adicionar lembrete</label>
            <button class="addLembretes">+</button>
        </div> <!-- Mostrar data que foi adicionada -->

        <div class="section">
            <h2>Ganhos</h2>
            <label for="ganhos">Adicionar ganhos</label>
            <button class="addGanhos">+</button>
        </div> <!-- Mostrar data que foi adicionada -->

        <div class="section">
            <h2>Gastos</h2>
            <label for="gastos">Adicionar gastos</label>
            <button class="addGastos">+</button>
        </div> <!-- Mostrar data que foi adicionada -->

    </main>

    <footer>
        <h2>Contatos</h2>
        <div class="contatos">
        <a href="https://www.linkedin.com/in/guilherme-vitor-thuler-27a30a257/" target="_blank"><img src="assets/imgs/linkedin.svg" alt="linkedin" width="40px"></a>

        <a href="https://github.com/GuiThuler" target="_blank"><img src="assets/imgs/github.svg" alt="GitHub" width="40px"></a>
        </div>
    </footer>
    </div>
</body>
<script src="script.js"></script>
</html>
