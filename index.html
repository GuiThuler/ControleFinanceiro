<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/imgs/icon.png" type="image/x-icon">
</head>
<body>
<div class="grid">

    <div class="topo">
        <img src="/assets/imgs/cofrinho-porco.png" alt="#" width="100px" class="img">
        <aside class="list">
            <nav>
            <ul>
                <li class="button"><a href="#" >Saiba mais</a></li>
                <li class="button"><a href="#" >Contato</a></li>
            </ul>
            </nav>
        </aside>
    </div>
    
    <header class="header">
        <div>
        <h1>Vida Financeira</h1>
        <h2>Suas financias na palma da mão!</h2>
        <img src="assets/vid/Scroll down.gif" alt="seta" class="seta">
        </div>
        
    </header>

    <main class="container">
        
    <section>
        <h2>Lembretes</h2>
        <form action="" method="get" class="formLembrete">
            <label for="lembrete">Adicionar lembrete:</label>
            <input type="text" class="addLembrete" placeholder="Fazer compras...">
            <button>+</button>
            </form>
        <div class="resultadoLembrete"></div>
    </section> <!-- Mostrar data que foi adicionada -->
    
        <section>
            <h2>Adicionar ganhos</h2>
            <form action="" method="get" class="formGanho">
                <label for="categoria">Categoria:</label>
                <input type="text" class="addCategoriaGanho" placeholder="Trabalho..." required>
                <br>
                <label for="ganhos">Valor ganho:</label>
                <input type="number" class="addValorGanho" required>
                <br>
                <button>+</button>
            </form>
            <div class="resultadoGanho"></div>
        </section> <!-- Mostrar data que foi adicionada -->

        <section>
            <h2>Adicionar gastos</h2>
            <form action="" method="get" class="formGasto">
                <label for="categoria">Categoria:</label>
                <input type="text" class="addCategoriaGasto" placeholder="Mercado..." required>
                <br>
                <label for="gastos">Valor gasto:</label>
                <input type="number" class="addValorGasto" required>
                <br>
                <button>+</button>
            </form>
            <div class="resultadoGasto"></div>
        </section> <!-- Mostrar data que foi adicionada -->

    </main>

    <footer>
        <h2>Contatos</h2>
        <div class="contatos">
        <a href="https://www.linkedin.com/in/guilherme-vitor-thuler-27a30a257/" target="_blank"><img src="assets/imgs/linkedin.svg" alt="linkedin" width="40px"></a>

        <a href="https://github.com/GuiThuler" target="_blank"><img src="assets/imgs/github.svg" alt="GitHub" width="40px"></a>
        </div>
    </footer>
    </div>
</body>
<script src="script.js"></script>
</html>
