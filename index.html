<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="imgs/icon.png" type="image/x-icon">
</head>
<body>
    <header class="header">
        <h1>Vida Financeira</h1>
        <p>Suas financias na palma da mão!</p>
        <img src="imgs/cofrinho-porco.png" alt="cofrinho" width="400px">
    </header>

    <main class="container">

        <div>
            <h2>Lembretes</h2>
            <p>MOSTRAR LEMBRETES</p>
            <button class="addLembretes">+</button>
            <label for="lembretes">Adicionar lembrete</label>
        </div> <!-- Mostrar data que foi adicionada -->

        <div>
            <h2>Ganhos &#128178;</h2>
            <p>MOSTRAR GANHOS</p>
            <button class="addGanhos">+</button>
            <label for="ganhos">Adicionar ganhos</label>
        </div> <!-- Mostrar data que foi adicionada -->

        <div>
            <h2>Gastos &#10008;</h2>
            <p>MOSTRAR GASTOS</p>
            <button class="addGastos">+</button>
            <label for="gastos">Adicionar gastos</label>
        </div> <!-- Mostrar data que foi adicionada -->

    </main>

    <footer>
        <p>Contatos</p>
        <a href="https://www.linkedin.com/in/guilherme-vitor-thuler-27a30a257/" target="_blank">Linkedin</a>
        <a href="https://github.com/GuiThuler" target="_blank">GitHub</a>
    </footer>

</body>
<script src="script.js"></script>
</html>
